<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Tomlinson Materials — Catalog</title>
<style>
:root{--red:#D81F2C;--ink:#1a1a1a;--mut:#6b6b6b;--line:#e3e3e3;--hd:#f6f6f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,"Helvetica Neue",Helvetica,sans-serif;color:var(--ink);background:#fff;font-size:13px;line-height:1.4;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none}
.ribbon{background:#161616;color:#b9b9b9;font-size:11px;text-align:center;padding:5px 12px;letter-spacing:.01em}
.ribbon b{color:#fff}.ribbon .r{color:#ff5a66;font-weight:bold}
header{display:flex;align-items:center;gap:26px;padding:13px 24px;max-width:1560px;margin:0 auto}
.browse{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:bold;color:var(--red);letter-spacing:.03em;cursor:pointer;text-transform:uppercase;flex:0 0 auto}
.browse svg{stroke:var(--red)}
.brandlogo{height:40px;width:auto;flex:0 0 auto}
.hsearch{flex:1;max-width:780px;display:flex;align-items:center;border:2px solid #8a8a8a;border-radius:3px;height:42px}
.hsearch input{flex:1;border:0;padding:0 14px;font-size:15px;outline:none;font-family:inherit;background:transparent}
.hsearch button{border:0;background:transparent;padding:0 13px;cursor:pointer;height:100%;display:flex;align-items:center}
.hutil{margin-left:auto;display:flex;align-items:center;gap:20px;font-size:13px;flex:0 0 auto}
.hutil a:hover{color:var(--red)}.hutil .ord{font-weight:bold;color:var(--red);text-transform:uppercase;letter-spacing:.02em}
.accent{height:3px;background:var(--red);max-width:1560px;margin:0 auto}
.layout{display:flex;max-width:1560px;margin:0 auto;align-items:flex-start}
.catnav{width:218px;flex:0 0 auto;padding:20px 0 50px;position:sticky;top:0;align-self:flex-start}
.catnav h4{font-size:15px;font-weight:bold;padding:0 20px 9px}
.catnav a{display:block;padding:6px 20px;font-size:13px;color:#262626;cursor:pointer;border-left:3px solid transparent}
.catnav a:hover{color:var(--red);border-left-color:var(--red);background:#fafafa}
main{flex:1;min-width:0;padding:18px 26px 70px;border-left:1px solid var(--line)}
.allh{font-size:14px;font-weight:bold;color:#555;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.csec{padding:20px 0 10px;border-bottom:1px solid var(--line)}
.csechd{display:flex;align-items:baseline;gap:12px;margin-bottom:12px}
.csec h2{font-size:21px;font-weight:bold;color:var(--red);letter-spacing:-.01em}
.cct{font-size:12px;color:var(--mut)}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:4px}
.tile{display:flex;flex-direction:column;align-items:center;text-align:center;padding:9px 5px 13px;cursor:pointer;border:1px solid transparent;border-radius:3px}
.tile:hover{border-color:var(--line);background:#fafafa}
.tile .th{width:80px;height:80px;border:1px solid var(--line);overflow:hidden;background:#f3f3f3;margin-bottom:8px}
.tile .tl{font-size:12px;line-height:1.25;color:#1a1a1a}
.tile:hover .tl{color:var(--red);text-decoration:underline}
.sw{width:100%;height:100%;display:block}
footer{border-top:1px solid var(--line);max-width:1560px;margin:0 auto;padding:16px 24px;font-size:12px;color:var(--mut);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
footer a:hover{color:var(--red)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#161616;color:#fff;padding:11px 20px;border-radius:4px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:100}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){.catnav{display:none}main{border-left:0}.hutil .ph,.hutil .em{display:none}.brandlogo{height:32px}header{gap:14px;padding:11px 16px}.browse span{display:none}}
@media(max-width:560px){header{flex-wrap:wrap;gap:12px}.hsearch{order:5;flex:1 0 100%;max-width:none}.hutil{gap:14px}.tiles{grid-template-columns:repeat(auto-fill,minmax(84px,1fr))}.tile .th{width:72px;height:72px}}

.pdp{max-width:1560px;margin:0 auto;padding:16px 26px 70px}
.pdpback{font-size:12.5px;color:var(--red);cursor:pointer;font-weight:bold;display:inline-flex;gap:5px;margin-bottom:9px}
.pcrumb{font-size:12px;color:var(--mut);margin-bottom:16px}.pcrumb a{cursor:pointer}.pcrumb a:hover{color:var(--red)}.pcrumb .sep{margin:0 6px;color:#ccc}
.pdptop{display:grid;grid-template-columns:300px 1fr 308px;gap:32px;align-items:start}
.pdpimg{border:1px solid var(--line);background:#f3f3f3;aspect-ratio:1/1;overflow:hidden}
.pdpimg .sw{width:100%;height:100%;display:block}
.pdpmain h1{font-size:27px;font-weight:bold;letter-spacing:-.015em;margin-bottom:4px}
.pdpmain .psub{font-size:14px;color:var(--mut);margin-bottom:13px}
.instock{font-size:13px;font-weight:bold;color:#1B7A3D;margin-bottom:16px}.instock.low{color:#B9560C}
.spectbl{width:100%;border-collapse:collapse;margin-bottom:18px}
.spectbl td{padding:7px 11px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top}
.spectbl tr:nth-child(odd) td{background:#fafafa}
.spectbl .sl{color:var(--mut);width:42%}.spectbl .sv{font-weight:bold;color:var(--ink)}
.pdesc{font-size:13.5px;color:#333;line-height:1.55;margin-bottom:18px}
.usesb h4,.docsb h4{font-size:11.5px;font-weight:bold;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);margin:0 0 8px}
.usesb ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.usesb li{font-size:12.5px;background:#f1f1f1;border:1px solid var(--line);border-radius:3px;padding:5px 10px}
.docsb a{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--red);font-weight:bold;margin-right:18px;cursor:pointer}.docsb a:hover{text-decoration:underline}
.buybox{border:1px solid #ccc;border-radius:4px;padding:18px;position:sticky;top:14px;background:#fff}
.pbig{font-size:28px;font-weight:bold;letter-spacing:-.01em;margin-bottom:2px}.pbig span{font-size:14px;color:var(--mut);font-weight:normal}
.tiers{width:100%;border-collapse:collapse;margin:13px 0}
.tiers th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);text-align:left;padding:5px 8px;border-bottom:2px solid var(--line)}
.tiers td{font-size:13px;padding:6px 8px;border-bottom:1px solid var(--line)}.tiers td:last-child{text-align:right;font-weight:bold}
.qrow{display:flex;align-items:center;gap:10px;margin:15px 0 5px}.qrow label{font-size:12.5px;color:var(--mut);font-weight:bold}
.qrow input{width:84px;height:38px;border:1px solid #aaa;border-radius:3px;padding:0 10px;font-size:15px;font-family:inherit}
.lt{font-size:13px;font-weight:bold;color:var(--ink);min-height:17px;margin-bottom:4px}
.addbtn{width:100%;background:var(--red);color:#fff;border:0;font-weight:bold;font-size:15px;padding:13px;border-radius:3px;cursor:pointer;margin-top:8px}.addbtn:hover{background:#b3121e}
.quotebtn{width:100%;background:#fff;border:1px solid #bbb;font-weight:bold;font-size:13px;padding:10px;border-radius:3px;cursor:pointer;margin-top:8px}.quotebtn:hover{border-color:#888}
.qbnote{font-size:13px;color:#333;background:#fafafa;border:1px solid var(--line);border-radius:3px;padding:11px;margin-bottom:11px;line-height:1.45}
.delivn{font-size:11.5px;color:var(--mut);margin-top:12px;line-height:1.45}
.related{margin-top:36px;border-top:1px solid var(--line);padding-top:20px}
.related h3{font-size:16px;font-weight:bold;margin-bottom:13px}
.reltiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:6px}
.reltile{display:flex;flex-direction:column;align-items:center;text-align:center;padding:9px;border:1px solid transparent;border-radius:3px;cursor:pointer;font-size:12px;line-height:1.25}
.reltile:hover{border-color:var(--line);background:#fafafa;color:var(--red)}
.reltile .th{width:82px;height:82px;border:1px solid var(--line);overflow:hidden;margin-bottom:7px}
@media(max-width:1000px){.pdptop{grid-template-columns:1fr}.buybox{position:static}.pdpimg{max-width:300px}}
</style></head>

function swatch(t,seed){const c=SW[t]||SW.granA,r=rng(seed*97+31),gid='msg'+seed,lite=shade(c.bg,24),dark=shade(c.bg,-20);
 let s=`<svg class="sw" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" role="img"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0.6" y2="1"><stop offset="0" stop-color="${lite}"/><stop offset="0.5" stop-color="${c.bg}"/><stop offset="1" stop-color="${dark}"/></linearGradient></defs><rect width="100" height="100" fill="url(#${gid})"/>`;
 const n=c.n||120;
 for(let i=0;i<n;i++){const x=(r()*104-2).toFixed(1),y=(r()*104-2).toFixed(1),sz=c.mn+r()*(c.mx-c.mn),col=c.c[(r()*c.c.length)|0],op=(.72+r()*.26).toFixed(2);
  if(c.strand){const w=(sz*.45).toFixed(1),h=(sz*2.6).toFixed(1),rot=(r()*360).toFixed(0);s+=`<rect x="${x}" y="${y}" width="${h}" height="${w}" rx="${w/2}" fill="${col}" opacity="${op}" transform="rotate(${rot} ${x} ${y})"/>`;}
  else if(c.round){s+=`<circle cx="${x}" cy="${y}" r="${(sz/2).toFixed(1)}" fill="${col}" opacity="${op}"/>`;}
  else if(c.ang){const k=3+((r()*3)|0),pts=[];for(let j=0;j<k;j++){const a=(j/k)*6.283+r()*1.1,rr=sz/2*(.62+r()*.62);pts.push(`${(x*1+Math.cos(a)*rr).toFixed(1)},${(y*1+Math.sin(a)*rr).toFixed(1)}`);}s+=`<polygon points="${pts.join(' ')}" fill="${col}" opacity="${op}"/>`;}
  else{s+=`<circle cx="${x}" cy="${y}" r="${(sz/2).toFixed(1)}" fill="${col}" opacity="${op}"/>`;}}
 s+=`<rect width="100" height="100" filter="url(#mslGrain)" opacity="0.4" style="mix-blend-mode:overlay"/><rect width="100" height="100" fill="url(#mslVig)"/>`;
 return s+'</svg>';}

const GRP={};PRODUCTS.forEach(p=>{(GRP[p.c]=GRP[p.c]||[]).push(p);});
function tile(p){const nm=p.n.replace(/"/g,'&quot;');const tags=(p.n+' '+(p.sz||'')+' '+(p.std||'')+' '+((p.use||[]).join(' '))).toLowerCase().replace(/"/g,'');return `<a class="tile" data-n="${nm}" data-s="${tags}" onclick="openProduct(${p.id})"><div class="th">${swatch(p.sw,p.id)}</div><div class="tl">${p.n}</div></a>`;}
document.getElementById('catnav').innerHTML='<h4>Choose a Category</h4>'+CATS.map(c=>`<a onclick="jump('sec-${c.id}')">${c.name}</a>`).join('');
document.getElementById('cats').innerHTML=CATS.map(c=>{const it=GRP[c.id]||[];return `<section class="csec" id="sec-${c.id}"><div class="csechd"><h2>${c.name}</h2><span class="cct">${it.length} ${it.length===1?'product':'products'}</span></div><div class="tiles">${it.map(tile).join('')}</div></section>`;}).join('');
function jump(id){const e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});}
function toast(t){const el=document.getElementById('tt');el.textContent=t;el.classList.add('on');clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('on'),1800);}
document.getElementById('q').addEventListener('input',function(){showHome();const q=this.value.toLowerCase().trim();document.querySelectorAll('.csec').forEach(sec=>{let any=false;sec.querySelectorAll('.tile').forEach(t=>{const m=!q||t.dataset.s.indexOf(q)>-1;t.style.display=m?'':'none';if(m)any=true;});sec.style.display=any?'':'none';});});

const BYID=Object.fromEntries(PRODUCTS.map(p=>[p.id,p]));
const money=n=>'$'+n.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
let ORDER=0;
function ab(u){return {tonne:'t','m³':'m³',yard:'yd³',each:'ea',bag:'bag',litre:'L'}[u]||u;}
function showHome(){document.getElementById('pdp').style.display='none';document.querySelector('.layout').style.display='flex';}
function tierPrice(p,q){let pr=p.p;(p.tr||[]).forEach(t=>{if(q>=t[0])pr=t[1];});return pr;}
function upd(id){const p=BYID[id],q=+(document.getElementById('pq').value)||0,el=document.getElementById('lt');if(el)el.textContent=q>0?'Est. '+money(q*tierPrice(p,q))+'  ·  '+money(tierPrice(p,q))+'/'+ab(p.u):'';}
function addOrder(id){const p=BYID[id],q=+(document.getElementById('pq').value)||0;if(q<=0){toast('Enter a quantity');return;}ORDER++;document.getElementById('ordc').textContent=ORDER;toast(q+' '+ab(p.u)+' · '+p.n+' added to order');}
function openProduct(id){const p=BYID[id];if(!p)return;const isQ=p.o==='quote';
 const specs=[['Standard',p.std],['Size / gradation',p.sz],['Bulk density',p.den?p.den+' t/m³':''],['Sold by',ab(p.u)+' (bulk)'],['Source',p.src]];
 if(p.attrs)for(const k in p.attrs)specs.push([k,p.attrs[k]]);
 const specrows=specs.filter(r=>r[1]).map(r=>`<tr><td class="sl">${r[0]}</td><td class="sv">${r[1]}</td></tr>`).join('');
 const uses=(p.use||[]).map(u=>`<li>${u}</li>`).join('');
 const tr=p.tr||[];const tiers=tr.map((t,i)=>{const rng=tr.length===1?'Any volume':(i===0?'1–'+(tr[1]?tr[1][0]-1:''):(tr[i+1]?t[0]+'–'+(tr[i+1][0]-1):t[0]+'+'));return `<tr><td>${rng} ${ab(p.u)}</td><td>${money(t[1])}</td></tr>`;}).join('');
 const rel=PRODUCTS.filter(x=>x.c===p.c&&x.id!==p.id).slice(0,6).map(x=>`<a class="reltile" onclick="openProduct(${x.id})"><div class="th">${swatch(x.sw,x.id)}</div><div>${x.n}</div></a>`).join('');
 const buy=isQ?`<div class="qbnote">Mix-designed product — priced by the load to your spec and schedule.</div><button class="addbtn" onclick="toast('Quote request started — prototype')">Request a quote</button><button class="quotebtn" onclick="toast('Spec sheet — prototype')">Download spec sheet (PDF)</button><div class="delivn">Plant pickup or delivery. A rep confirms mix design, schedule and price.</div>`:`<div class="pbig">${money(p.p)} <span>/ ${ab(p.u)}</span></div>${tr.length>1?`<table class="tiers"><thead><tr><th>Volume</th><th>Price / ${ab(p.u)}</th></tr></thead><tbody>${tiers}</tbody></table>`:''}<div class="qrow"><label>Qty (${ab(p.u)})</label><input id="pq" type="number" min="1" value="20" oninput="upd(${p.id})"></div><div class="lt" id="lt"></div><button class="addbtn" onclick="addOrder(${p.id})">Add to Order</button><button class="quotebtn" onclick="toast('Spec sheet — prototype')">Spec sheet (PDF) · SDS</button><div class="delivn">Yard-pickup price shown. Delivery quoted by postal code · or will-call pickup.</div>`;
 document.getElementById('pdp').innerHTML=`<div class="pdpback" onclick="showHome()">‹ Back to catalog</div><div class="pcrumb"><a onclick="showHome()">All Categories</a><span class="sep">/</span><a onclick="showHome()">${CN[p.c]}</a><span class="sep">/</span>${p.n}</div><div class="pdptop"><div class="pdpimg">${swatch(p.sw,p.id)}</div><div class="pdpmain"><h1>${p.n}</h1><div class="psub">${[p.std,p.sz].filter(Boolean).join(' · ')}</div><div class="instock ${p.st==='low'?'low':''}">${p.st==='low'?'● Low stock':'● In stock'} — ${isQ?'made to order':'ships from '+(p.src||'yard').toLowerCase()}</div><table class="spectbl"><tbody>${specrows}</tbody></table><div class="pdesc">${p.desc||''}</div>${uses?`<div class="usesb"><h4>Used for</h4><ul>${uses}</ul></div>`:''}<div class="docsb"><h4>Documents</h4><a onclick="toast('Spec sheet — prototype')">Spec sheet (PDF)</a><a onclick="toast('SDS — prototype')">Safety data sheet</a><a onclick="toast('Gradation chart — prototype')">Gradation chart</a></div></div><div class="buybox">${buy}</div></div>${rel?`<div class="related"><h3>Frequently ordered with</h3><div class="reltiles">${rel}</div></div>`:''}`;
 document.querySelector('.layout').style.display='none';document.getElementById('pdp').style.display='block';window.scrollTo(0,0);if(!isQ)upd(p.id);
}
</script></body></html>
